<script>
        function toggleBottomSheet(show) {
            const sheet = document.getElementById('bottom-sheet');
            if (show) {
                // Determine translation based on screen size (avoid overlapping with bottom nav on mobile)
                const isMobile = window.innerWidth < 768;
                const translateY = isMobile ? 'translateY(-72px)' : 'translateY(0)'; // 72px is roughly the height of bottom nav
                
                // Remove the full translation, apply specific calculation
                sheet.classList.remove('translate-y-full');
                sheet.style.transform = translateY;
            } else {
                sheet.classList.add('translate-y-full');
                sheet.style.transform = ''; // reset inline style
            }
        }
    </script>
